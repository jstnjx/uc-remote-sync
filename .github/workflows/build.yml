name: Build

on:
  workflow_call:
    outputs:
      version:
        description: Version read from package.json
        value: ${{ jobs.build.outputs.version }}
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Validate and build Remote package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"

      - name: Read and verify version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          driver_version="$(node -p "JSON.parse(require('fs').readFileSync('driver.json', 'utf8')).version")"
          app_version="$(node --input-type=module -e "import('./src/shared/constants.js').then(({ APP_VERSION }) => process.stdout.write(APP_VERSION))")"

          test "$package_version" = "$driver_version"
          test "$package_version" = "$app_version"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            test "v${package_version}" = "$GITHUB_REF_NAME"
          fi

          echo "version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Check source
        run: node tools/check-source.js

      - name: Build Remote package
        run: bash tools/build_embedded.sh

      - name: Validate Remote package
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          archive="remote-sync-${version}.tar.gz"
          checksum="${archive}.sha256"

          test -f "$archive"
          test -f "$checksum"
          sha256sum -c "$checksum"
          test "$(stat -c %s "$archive")" -lt 104857600

          mkdir -p verify
          tar -xzf "$archive" -C verify

          test -f verify/driver.json
          test -f verify/remote-sync.png
          test -x verify/bin/driver.js
          test -f verify/bin/package.json
          test ! -e verify/bin/driver.exe

          node --check verify/bin/driver.js
          test "$(node -p "JSON.parse(require('fs').readFileSync('verify/driver.json', 'utf8')).version")" = "$version"

          if find verify -type l -print -quit | grep -q .; then
            echo "Package contains forbidden symbolic links" >&2
            exit 1
          fi

          if find verify -path "*/tests/*.js" -print -quit | grep -q .; then
            echo "Package contains test files" >&2
            exit 1
          fi

      - name: Upload Remote package
        uses: actions/upload-artifact@v4
        with:
          name: remote-sync-${{ steps.version.outputs.version }}
          path: |
            remote-sync-${{ steps.version.outputs.version }}.tar.gz
            remote-sync-${{ steps.version.outputs.version }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
